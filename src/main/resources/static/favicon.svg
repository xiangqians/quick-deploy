<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <defs>
        <!-- 背景渐变 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2c4c5e"/>
            <stop offset="100%" stop-color="#3d6b80"/>
        </linearGradient>

        <!-- 字母渐变 -->
        <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="40%" stop-color="#e0f7fa"/>
            <stop offset="100%" stop-color="#80deea"/>
        </linearGradient>

        <!-- 微光滤镜 -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <!-- 圆角矩形背景（圆角12px） -->
    <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bgGrad)" stroke="#FFD96640" stroke-width="1.5"/>

    <!-- 内部装饰高光斜线 -->
    <polygon points="8,56 16,60 8,48" fill="#FFD96620" opacity="0.6"/>

    <!-- 字母 QD 组合，居中显示 -->
    <text x="32" y="42" font-family="'Segoe UI', 'Inter', 'Poppins', Arial, sans-serif" font-weight="800" font-size="36"
          text-anchor="middle" fill="url(#letterGrad)" filter="url(#glow)">
        Qᴰ
    </text>

    <!-- 外框微光边框 -->
    <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="none" stroke="#FFD96630" stroke-width="1"/>
</svg>