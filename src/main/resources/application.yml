server:
  # 端口
  port: 58080
  servlet:
    # 上下文路径
    context-path: /
    session:
      # 设置会话过期时间：12h
      timeout: PT12H
      cookie:
        # 设置cookie过期时间：12h
        max-age: PT12H

dir: ./

spring:
  # 模板配置
  thymeleaf:
    # Thymeleaf的模板位置，默认值：classpath:/templates/
    prefix: classpath:/template/
    # 匹配后缀
    suffix: .html
    # 模板模式
    mode1: HTML5
    # 模板编码
    encoding: UTF-8
    # 是否使用页面缓存
    cache: false

logging:
  level:
    _org.springframework: INFO
    org.springframework: INFO
    org.eclipse.jgit: INFO
    org.thymeleaf: INFO
