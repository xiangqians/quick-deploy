# 组唯一标识
- id: dev
  # 组名称
  name: 开发环境
  # 是否启用组
  enabled: true
  # Git
  git:
    # 用户
    user: myuser
    # 密码
    passwd: mypasswd
  # 服务器
  server:
    # 主机
    host: myserver
    # 端口
    port: 22
    # 用户
    user: myuser
    # 密码
    passwd: mypasswd
  # 项目列表
  projs:
    # 项目唯一标识
    - id: java-proj
      # 项目名称
      name: Java项目
      # 是否启用项目
      enabled: true
      # 触发器
      trigger:
        # Webhook（网络钩子）触发：通过 HTTP 回调触发部署
        webhook:
          # 认证令牌
          token: mytoken
        # 轮询触发：定期检测并触发部署
        polling:
          # 轮询间隔，单位：秒
          interval: 15
      # Git
      git:
        # 仓库
        repo:
          # 地址
          url: http://mygit.org/example/java-proj.git
          # 分支
          branches: dev
      # 构建
      build:
        # 命令集
        cmds:
          # Windows
          # 找到 Maven 安装目录下的 bin/mvn.cmd，在文件中开始执行之前添加：
          # @REM 设置 Maven 命令输出为 UTF-8 编码
          # set MAVEN_OPTS=%MAVEN_OPTS% -Dfile.encoding=UTF-8 -Dconsole.encoding=UTF-8
          #- run: mvn.cmd clean package -Dmaven.test.skip=true -Dproject.build.sourceEncoding=UTF-8 -Dproject.reporting.outputEncoding=UTF-8 -Dfile.encoding=UTF-8
          # Linux
          - run: mvn clean package -Dmaven.test.skip=true -Dproject.build.sourceEncoding=UTF-8 -Dproject.reporting.outputEncoding=UTF-8 -Dfile.encoding=UTF-8
        # 目标集
        targets:
          - web/target/web-1.0.0.jar
      # 部署
      deploy:
        # 命令集
        cmds:
          # 名称
          - name: overwrite_restart
            # 满足条件时暂停，需用户确认后执行
            pause: "#operatorName == 'webhook'"
            # 执行
            run: mv web-1.0.0.jar /opt/java-proj/
          - run: cd /opt/java-proj && ./stop.sh
          - run: cd /opt/java-proj && ./start.sh

    - id: vue-proj
      name: Vue项目
      git:
        user: myuser
        passwd: mypasswd
        repo:
          url: http://mygit.org/example/vue-proj.git
          branch: dev
      server:
        host: myserver
        port: 22
        user: myuser
        passwd: mypasswd
      build:
        # 安装环境：
        # 1）安装 nvm
        #    $ wget -qO- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
        #    $ ln -sf /root/.nvm/versions/node/v20.18.0/bin/node /usr/local/bin/node
        #    $ ln -sf /root/.nvm/versions/node/v20.18.0/bin/npm /usr/local/bin/npm
        #    $ ln -sf /root/.nvm/versions/node/v20.18.0/bin/npx /usr/local/bin/npx
        # 2）$ nvm install 20.18.0
        # 3）$ nvm list
        #    $ nvm use 20.18.0
        cmds:
          # Windows
          #- run: rmdir /s /q dist
          # Linux
          - run: rm -rf dist

          - run: npm install
          - run: npm install @zip.js/zip.js@2.7.73 uuid@9.0.0 --save-exact
          - run: npm run build:test
        targets:
          - dist/assets
          - dist/images
          - dist/index.html
      deploy:
        cmds:
          - name: overwrite_reload
            pause: "#operatorName == 'webhook'"
            run: rm -rf /opt/nginx/html/vue-proj/assets
          - run: rm -rf /opt/nginx/html/vue-proj/images
          - run: rm -rf /opt/nginx/html/vue-proj/index.html
          - run: mv assets /opt/nginx/html/vue-proj/
          - run: mv images /opt/nginx/html/vue-proj/
          - run: mv index.html /opt/nginx/html/vue-proj/
          - run: chown -R www:www /opt/nginx/html/vue-proj/assets
          - run: chown -R www:www /opt/nginx/html/vue-proj/images
          - run: chown -R www:www /opt/nginx/html/vue-proj/index.html
          # error: invalid PID number "" in "/run/nginx.pid"
          # $ ps aux | grep nginx
          # $ cat /run/nginx.pid
          # 使用 pgrep 自动获取 Nginx 主进程 PID
          # $ pgrep -f "nginx: master" | tee /run/nginx.pid
          - run: nginx -s reload
